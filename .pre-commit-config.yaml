repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest --maxfail=1 --cov=ops_summary --cov-report=term-missing
        language: system
        pass_filenames: false
        files: ^(ops_summary/|tests/)
