repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7            # pin to a released tag
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests"]  # drop/replace if unnecessary

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest --maxfail=1 --cov=ops_summary --cov-report=term-missing
        language: system
        types: [python]
