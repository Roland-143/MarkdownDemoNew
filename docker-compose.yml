services:
  db:
    image: postgres:16-alpine
    container_name: ops-summary-db
    environment:
      POSTGRES_DB: ops_summary
      POSTGRES_USER: ops_user
      POSTGRES_PASSWORD: ops_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/docker_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops-summary-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ops_user:ops_password@db:5432/ops_summary
      AUTO_LOAD_DB_ON_START: "1"
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  postgres_data:
